<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login - Panel Administrativo</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-container {
      background: #ffffff;
      padding: 35px;
      border-radius: 12px;
      width: 340px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    h2 {
      text-align: center;
      margin-bottom: 10px;
      color: #0f172a;
    }

    p {
      text-align: center;
      font-size: 13px;
      color: #64748b;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 12px;
      margin-bottom: 5px;
      font-size: 14px;
      color: #334155;
    }

    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      outline: none;
    }

    input:focus {
      border-color: #2563eb;
    }

    .error {
      color: #dc2626;
      font-size: 12px;
      display: none;
      margin-top: 4px;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #2563eb;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .msg {
      margin-top: 10px;
      font-size: 13px;
      text-align: center;
      display: none;
    }

    .success {
      color: #16a34a;
    }

    .danger {
      color: #dc2626;
    }
  </style>
</head>

<body>

  <div class="login-container">

    <h2>Iniciar Sesión</h2>
    <p>Acceso exclusivo para personal autorizado</p>

    <form id="formLogin">

      <label for="correo">Correo electrónico</label>
      <input type="email" id="correo" placeholder="ej: admin@empresa.com">
      <span id="errorCorreo" class="error"></span>

      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="Mínimo 6 caracteres">
      <span id="errorPassword" class="error"></span>

      <button type="submit">Entrar</button>

      <div id="mensaje" class="msg"></div>

    </form>

  </div>

  <script>

    const form = document.getElementById("formLogin");
    const correo = document.getElementById("correo");
    const password = document.getElementById("password");

    const errorCorreo = document.getElementById("errorCorreo");
    const errorPassword = document.getElementById("errorPassword");
    const mensaje = document.getElementById("mensaje");

    function validar() {
      let errores = false;

      // CORREO
      if (correo.value.trim() === "") {
        errorCorreo.textContent = "El correo es obligatorio";
        errorCorreo.style.display = "block";
        errores = true;
      } else if (!correo.value.includes("@")) {
        errorCorreo.textContent = "El correo debe contener @";
        errorCorreo.style.display = "block";
        errores = true;
      } else {
        errorCorreo.textContent = "";
        errorCorreo.style.display = "none";
      }

      // PASSWORD
      if (password.value === "") {
        errorPassword.textContent = "La contraseña es obligatoria";
        errorPassword.style.display = "block";
        errores = true;
      } else if (password.value.length < 6) {
        errorPassword.textContent = "Mínimo 6 caracteres";
        errorPassword.style.display = "block";
        errores = true;
      } else {
        errorPassword.textContent = "";
        errorPassword.style.display = "none";
      }

      return !errores;
    }

    form.addEventListener("submit", function(e) {
      e.preventDefault();

      mensaje.style.display = "none";

      if (validar()) {
        mensaje.textContent = "Acceso correcto. Entrando al panel...";
        mensaje.className = "msg success";
        mensaje.style.display = "block";

        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 1000);

      } else {
        mensaje.textContent = "Corrige los errores antes de continuar";
        mensaje.className = "msg danger";
        mensaje.style.display = "block";
      }
    });

  </script>

</body>
</html>
